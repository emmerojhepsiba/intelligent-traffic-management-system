<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TrafficCommand{% endblock %} - Smart Traffic Management</title>
    <meta name="description" content="Real-time traffic monitoring, AI-powered vehicle detection, and smart routing for modern traffic management.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        navy: { 50:'#f0f4ff', 100:'#dbe4ff', 200:'#bac8ff', 300:'#91a7ff',
                                400:'#748ffc', 500:'#5c7cfa', 600:'#4c6ef5', 700:'#4263eb',
                                800:'#3b5bdb', 900:'#364fc7', 950:'#1a2550' },
                        signal: { green:'#22c55e', amber:'#f59e0b', red:'#ef4444' },
                        surface: { 50:'#f8fafc', 100:'#f1f5f9', 200:'#e2e8f0',
                                   800:'#1e293b', 900:'#0f172a', 950:'#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #4263eb, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glow-blue { box-shadow: 0 0 30px rgba(66,99,235,0.3); }
        .glow-green { box-shadow: 0 0 20px rgba(34,197,94,0.3); }
        .glow-red { box-shadow: 0 0 20px rgba(239,68,68,0.3); }
        .glow-amber { box-shadow: 0 0 20px rgba(245,158,11,0.3); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(0,0,0,0.3); }
        .animate-in { animation: slideIn 0.5s ease-out forwards; opacity: 0; }
        @keyframes slideIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
        .density-low { color: #22c55e; }
        .density-medium { color: #f59e0b; }
        .density-high { color: #ef4444; }
        .bg-density-low { background-color: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
        .bg-density-medium { background-color: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .bg-density-high { background-color: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        /* Toast */
        .toast { position:fixed; top:24px; right:24px; z-index:9999; padding:12px 20px; border-radius:8px; font-size:14px; font-weight:500; transform:translateX(120%); transition:transform 0.3s ease; }
        .toast.show { transform:translateX(0); }
        .toast-success { background:#065f46; color:#d1fae5; border:1px solid #059669; }
        .toast-error { background:#7f1d1d; color:#fecaca; border:1px solid #dc2626; }
        .toast-warning { background:#78350f; color:#fef3c7; border:1px solid #f59e0b; }
        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body class="bg-surface-950 text-surface-200 antialiased">
    <div id="toast-container"></div>
    {% block body %}{% endblock %}

    <script>
        function showToast(message, type = 'success', duration = 4000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        async function apiCall(url, options = {}) {
            try {
                const res = await fetch(url, {
                    headers: { 'Content-Type': 'application/json', ...options.headers },
                    ...options
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Request failed');
                return data;
            } catch (err) {
                showToast(err.message, 'error');
                throw err;
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
